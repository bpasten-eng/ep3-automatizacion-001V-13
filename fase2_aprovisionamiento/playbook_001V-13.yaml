---
- name: "EP3 - Aprovisionamiento Router Almacenes Generales SA"
  hosts: csr1kv
  gather_facts: false

  vars_files:
    - ../vars/vars_001V-13.yaml

  tasks:

    - name: "Respaldar configuracion actual"
      ios_command:
        commands:
          - show running-config
      register: backup_output

    - name: "Guardar respaldo en archivo"
      copy:
        content: "{{ backup_output.stdout[0] }}"
        dest: "respaldo/backup_001V-13.cfg"
        force: no
      delegate_to: localhost

    - name: "Habilitar NETCONF"
      ios_config:
        lines:
          - netconf-yang

    - name: "Habilitar RESTCONF"
      ios_config:
        lines:
          - restconf

    - name: "Habilitar servidor HTTP seguro"
      ios_config:
        lines:
          - ip http secure-server
          - ip http authentication local

    - name: "Configurar hostname corporativo"
      ios_config:
        lines:
          - "hostname {{ router.hostname }}"

    - name: "Configurar banner de acceso"
      ios_config:
        lines:
          - "banner motd ^ {{ router.banner }} ^"
        match: none
      changed_when: false

    - name: "Configurar servidor NTP"
      ios_config:
        lines:
          - "ntp server {{ router.ntp_server }}"

    - name: "Configurar descripcion interfaz GigabitEthernet1"
      ios_config:
        parents: "interface GigabitEthernet1"
        lines:
          - "description {{ router.descripcion_wan }}"

    - name: "Crear interfaz Loopback con IP de gestion"
      ios_config:
        parents: "interface Loopback{{ router.loopback_id }}"
        lines:
          - "ip address {{ router.loopback_ip }} {{ router.loopback_mask }}"
        match: strict
